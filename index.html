<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>16タイプ診断</title>
<style>
body { font-family: Arial; background:#111; color:#eee; margin:0; padding:20px; }
.container { max-width:700px; margin:auto; }
.card { background:#1a1a1a; padding:20px; border-radius:12px; margin-bottom:20px; }
.question { margin-bottom:20px; }
label { display:block; margin:6px 0; padding:10px; background:#222; border-radius:8px; cursor:pointer; }
button { padding:12px 20px; margin-top:10px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.hidden { display:none; }
.resultBox { text-align:center; }
.type { font-size:32px; font-weight:bold; margin-top:20px; }
.desc { margin-top:20px; font-size:18px; }
canvas { margin-top:20px; background:#000; border-radius:10px; }
.error { color:#ff6b6b; }
</style>
</head>
<body>
<div class="container">
<h1>16タイプ診断</h1>
<form id="quiz">

<div id="page1" class="card"><h2>1〜10問</h2><div id="p1"></div><button type="button" onclick="next(1)">次へ</button><div class="error" id="err1"></div></div>
<div id="page2" class="card hidden"><h2>11〜20問</h2><div id="p2"></div><button type="button" onclick="next(2)">次へ</button><div class="error" id="err2"></div></div>
<div id="page3" class="card hidden"><h2>21〜30問</h2><div id="p3"></div><button type="button" onclick="calculate()">結果を見る</button><div class="error" id="err3"></div></div>

</form>

<div id="resultPage" class="hidden resultBox">
<div class="type" id="type"></div>
<div class="desc" id="desc"></div>
<canvas id="canvas" width="300" height="300"></canvas>
<br>
<button onclick="share()">シェアする</button>
<button onclick="downloadImage()">画像保存</button>
<button onclick="location.reload()">もう一度</button>
<div id="stats"></div>
</div>
</div>

<script>
// ★ 修正：ちゃんとした質問に戻した
const questions = [
"思いついたらすぐ動く？","直感で判断することが多い？","計画はあまり立てない？","その場の流れで動く？","リスクはできるだけ避けたい？","慎重に様子を見る方だ？","安定している方が好き？","コツコツ努力するのが好き？","計画を立てるのは苦手？","ノリで行動を変えることが多い？",
"決められたやり方の方が安心？","段取りを重視する方だ？","予定外のことは苦手？","ルールや手順を守る方？","自分から行動することが多い？","挑戦するのが好き？","多少のリスクは気にしない？","思い切りがいい方だ？","刺激のある方を選びがち？","変化がある方が楽しい？",
"新しいことにワクワクする？","同じことの繰り返しは飽きる？","楽しさを優先することが多い？","長期的な安定を重視する？","堅実に進めるのが好き？","無難な選択をしがち？","周りに合わせることが多い？","協調性があると言われる？","一人でいるのも苦じゃない？","自分のやり方を優先する？"
];

function render(){
 questions.forEach((q,i)=>{
   const html=`Q${i+1} ${q}<label><input type=radio name=q${i+1} value=A>はい</label><label><input type=radio name=q${i+1} value=B>いいえ</label>`;
   if(i<10) p1.innerHTML+=`<div class=question>${html}</div>`;
   else if(i<20) p2.innerHTML+=`<div class=question>${html}</div>`;
   else p3.innerHTML+=`<div class=question>${html}</div>`;
 });
}
render();

function check(p){
 for(let i=(p-1)*10+1;i<=p*10;i++){
   if(!document.querySelector(`input[name=q${i}]:checked`)) return false;
 }
 return true;
}

function next(p){
 if(!check(p)){
   document.getElementById('err'+p).innerText='すべて回答してください';
   return;
 }
 document.getElementById('page'+p).classList.add('hidden');
 document.getElementById('page'+(p+1)).classList.remove('hidden');
}

function calculate(){
 if(!check(3)){
   document.getElementById('err3').innerText='すべて回答してください';
   return;
 }

 const f=document.forms['quiz'];
 let AP=0,PU=0,EB=0,XG=0;

 ['q1','q2','q3','q9'].forEach(q=>{ if(f[q].value==='A') AP++; });
 ['q4','q10','q11','q12','q13','q14'].forEach(q=>{ if(f[q].value==='A') PU++; });
 ['q5','q6','q15','q16','q17','q18'].forEach(q=>{ if(f[q].value==='B') EB++; });
 ['q7','q8','q19','q20','q21','q22'].forEach(q=>{ if(f[q].value==='B') XG++; });

 const type=(AP>=2?'A':'P')+(PU>=3?'P':'U')+(EB>=2?'B':'E')+(XG>=2?'X':'G');

 const descs={
"AUBX":"自由奔放な冒険家。直感と勢いで動き、刺激を求めるタイプ。",
"AUBG":"柔軟で現実的なバランサー。ノリと安定の両立。",
"AUEX":"慎重さと柔軟さを併せ持つ変化型。",
"AUEG":"落ち着いた柔軟派。安定志向。",
"APBX":"行動力のあるリーダー。",
"APBG":"現実的で頼れる実行者。",
"APEX":"挑戦と楽しさを両立するタイプ。",
"APEG":"慎重で堅実な安定型。",
"PUBX":"計画的な勝負師。",
"PUBG":"王道の安定実力者。",
"PUEX":"柔軟な戦略家。",
"PUEG":"冷静な分析型。",
"PPBX":"計算された挑戦者。",
"PPBG":"最も安定した優等生タイプ。",
"PPEX":"計画的エンジョイ勢。",
"PPEG":"堅実で慎重な安定型。"
 };

 document.getElementById('quiz').classList.add('hidden');
 document.getElementById('resultPage').classList.remove('hidden');
 document.getElementById('type').innerText="あなたのタイプ: "+type;
 document.getElementById('desc').innerText=descs[type];

 drawImage(type);
 saveStats(type);
 showStats();
}

function drawImage(type){
 const c=document.getElementById('canvas');
 const ctx=c.getContext('2d');
 ctx.fillStyle="#000";ctx.fillRect(0,0,300,300);
 ctx.fillStyle="#fff";
 ctx.font="20px Arial";
 ctx.fillText("あなたのタイプ",60,120);
 ctx.font="40px Arial";
 ctx.fillText(type,110,180);
}

function downloadImage(){
 const link=document.createElement('a');
 link.download="result.png";
 link.href=document.getElementById('canvas').toDataURL();
 link.click();
}

function share(){
 const text="診断やってみた！結果はこれ👇";
 const url=location.href;
 window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`);
}

function saveStats(type){
 let data=JSON.parse(localStorage.getItem('stats')||"{}");
 data[type]=(data[type]||0)+1;
 localStorage.setItem('stats',JSON.stringify(data));
}

function showStats(){
 let data=JSON.parse(localStorage.getItem('stats')||"{}");
 let html="<h3>タイプ分布</h3>";
 for(let k in data){ html+=`${k}: ${data[k]}回<br>`; }
 document.getElementById('stats').innerHTML=html;
}
</script>
</body>
</html>
